<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Library Books</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f8f9fa; }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">Library</a>
</nav>

<div class="container mt-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="text-primary">Library Books</h3>
        <a href="/books/add" class="btn btn-success">Add Book</a>
    </div>

    <form action="/books/search" method="get" class="d-flex mb-4">
        <input type="text" name="keyword" class="form-control me-2" placeholder="Search by title or author">
        <button class="btn btn-primary">Search</button>
    </form>

    <div class="card shadow-sm">
        <table class="table table-hover mb-0">
            <thead class="table-dark">
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>Category</th>
                <th>Quantity</th>
                <th style="width: 250px;">Actions</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="book : ${books}">
                <td th:text="${book.title}"></td>
                <td th:text="${book.author}"></td>
                <td th:text="${book.category}"></td>
                <td th:text="${book.quantity}"></td>
                <td>
                    <a th:href="@{/books/edit/{id}(id=${book.id})}" class="btn btn-sm btn-primary">Edit</a>
                    <a th:href="@{/books/delete/{id}(id=${book.id})}"
                       onclick="return confirm('Delete this book?')"
                       class="btn btn-sm btn-danger">Delete</a>
                    <a th:href="@{/books/issue/{id}(id=${book.id})}" class="btn btn-sm btn-warning">Issue</a>
                    <a th:href="@{/books/return/{id}(id=${book.id})}" class="btn btn-sm btn-success">Return</a>
                </td>
            </tr>

            <tr th:if="${#lists.isEmpty(books)}">
                <td colspan="5" class="text-center py-3">No books available</td>
            </tr>

            </tbody>
        </table>
    </div>

</div>

<footer class="text-center mt-5 py-3 text-muted">
    © 2026 Library Management System
</footer>

</body>
</html>
