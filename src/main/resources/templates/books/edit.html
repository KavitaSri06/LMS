<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Book</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body { background-color: #f8f9fa; }
    </style>
</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">
    <a class="navbar-brand" href="/">Library</a>
</nav>

<div class="container mt-5">

    <div class="card shadow p-4 mx-auto" style="max-width: 500px;">
        <h4 class="mb-3 text-warning">Edit Book</h4>

        <form th:action="@{/books/edit/{id}(id=${book.id})}" method="post">

            <div class="mb-3">
                <label>Title</label>
                <input type="text" name="title" th:value="${book.title}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Author</label>
                <input type="text" name="author" th:value="${book.author}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Category</label>
                <input type="text" name="category" th:value="${book.category}" class="form-control">
            </div>

            <div class="mb-3">
                <label>Quantity</label>
                <input type="number" name="quantity" th:value="${book.quantity}" class="form-control">
            </div>

            <div class="d-flex justify-content-between">
                <a href="/books" class="btn btn-secondary">Back</a>
                <button class="btn btn-warning">Update</button>
            </div>

        </form>
    </div>

</div>

<footer class="text-center mt-5 py-3 text-muted">
    © 2026 Library Management System
</footer>

</body>
</html>
